<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Wanderplan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="logo-wrap"><div class="logo"><div class="logo-pin"></div>Wanderplan</div></div>
    <div class="nav">
      <div class="nav-lbl">Plan</div>
      <div class="ni active" id="ni-trips" onclick="sv('trips',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2.5" width="12" height="10" rx="1.8" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 5.5h12M5 2.5v3M10 2.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Trips</div>
      <div class="ni" id="ni-places" onclick="sv('places',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5C5.3 1.5 3.5 3.3 3.5 5.5c0 3.2 4 7.5 4 7.5s4-4.3 4-7.5c0-2.2-1.8-4-4-4z" stroke="currentColor" stroke-width="1.3"/><circle cx="7.5" cy="5.5" r="1.2" stroke="currentColor" stroke-width="1.2"/></svg>Places</div>
      <div class="ni" id="ni-food" onclick="sv('food',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M5 2v4a2.5 2.5 0 0 0 5 0V2M7.5 8v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M11.5 2c0 3.5-1.5 5.5-1.5 5.5v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Food & Restaurants</div>
      <div class="ni" id="ni-journal" onclick="sv('journal',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2.5" y="1.5" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 5h5M5 7.5h5M5 10h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Journal</div>
      <div class="ni" id="ni-gallery" onclick="sv('gallery',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="1.5" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="5.5" cy="5.5" r="1.2" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 10l3.5-3 2.5 2.5 2-1.5 3.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Gallery</div>
      <div class="nav-lbl">Remember</div>
      <div class="ni" id="ni-past" onclick="sv('past',this)"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 4.5v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Past travels</div>
      <div class="nav-lbl" style="margin-top:8px;">My trips</div>
      <div id="trip-nav"></div>
    </div>
  </div>
  <div class="sov" id="sov" onclick="closeSB()"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="hamburger" onclick="toggleSB()"><span></span><span></span><span></span></div>
        <span class="topbar-title" id="topbar-title">Trips</span>
      </div>
      <button class="btn btn-gold btn-sm" id="add-btn" onclick="openAdd()">+ Add</button>
    </div>
    <div id="tab-bar-wrap"></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="lightbox-root"></div>
<button id="scroll-top-btn" onclick="scrollToTop()" aria-label="Scroll to top">↑</button>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loading-text" class="loading-text">Syncing data...</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
